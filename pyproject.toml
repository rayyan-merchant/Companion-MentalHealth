[tool.ruff]
target-version = "py311"
line-length = 88
exclude = ["venv", ".venv", "frontend"]

[tool.ruff.lint]
select = ["E", "F", "I", "B"]
ignore = ["E501", "B008", "B904"]

[tool.ruff.lint.per-file-ignores]
"agents/vector_store.py" = ["E402"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
follow_imports = "skip"
check_untyped_defs = true
warn_unused_ignores = true
files = [
    "backend/config.py",
    "backend/database.py",
    "backend/models.py",
    "backend/security.py",
    "backend/rate_limit.py",
    "backend/auth.py",
    "backend/auth_routes.py",
    "backend/session_store.py",
    "backend/session_routes.py",
    "backend/main.py",
]
