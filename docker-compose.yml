services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: companion
      POSTGRES_USER: companion
      POSTGRES_PASSWORD: companion
    ports:
      - "5432:5432"
    volumes:
      - companion-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U companion"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://companion:companion@postgres:5432/companion
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:10000
      SUPPORT_EMAIL: support@example.com
      ENABLE_LLM: "false"
    ports:
      - "10000:10000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
      uvicorn backend.main:app --host 0.0.0.0 --port 10000"

volumes:
  companion-postgres:
