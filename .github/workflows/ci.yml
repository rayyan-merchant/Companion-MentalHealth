name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: companion
          POSTGRES_USER: companion
          POSTGRES_PASSWORD: companion
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U companion"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+asyncpg://companion:companion@localhost:5432/companion
      REDIS_URL: redis://localhost:6379/0
      ENABLE_LLM: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check backend agents tests
      - run: mypy
      - run: alembic upgrade head
      - run: python -m unittest discover -s tests -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run lint
      - working-directory: frontend
        run: npm test
      - working-directory: frontend
        run: npm run build
      - working-directory: frontend
        run: npm audit --audit-level=high

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t companion:test .
